<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Akses Buku</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eaf2ff, #f8fbff);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #111827;
    }

    .subtitle {
      margin: 0 0 22px;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #1f2937;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      width: 100%;
      padding: 12px 16px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
    }

    .msg {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.45;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .help {
      margin-top: 16px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
      text-align: center;
    }

    .help code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login Buku</h1>
    <p class="subtitle">
      Masukkan email sebagai username dan password untuk mengakses preview buku.
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="msg {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" autocomplete="off">
      <label for="username">Email / Username</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="contoh@email.com"
        required
      >

      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Masukkan password"
        required
      >

      <button type="submit">Masuk</button>
    </form>

    
    </div>
  </div>
</body>
</html>
