<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview Buku</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: #111827;
      color: white;
    }
    .frame-wrap {
      height: calc(100vh - 56px);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    a.logout {
      color: white;
      text-decoration: none;
      background: #dc2626;
      padding: 8px 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body oncontextmenu="return false;">
  <div class="topbar">
    <div>Halo, {{ username }} | Preview Buku</div>
    <a class="logout" href="{{ url_for('logout') }}">Logout</a>
  </div>

  <div class="frame-wrap">
    <iframe src="{{ url_for('book') }}#toolbar=0&navpanes=0&scrollbar=1"></iframe>
  </div>

  <script>
    document.addEventListener("keydown", function(e) {
      if (
        (e.ctrlKey && ["s", "p", "u"].includes(e.key.toLowerCase())) ||
        e.key === "F12"
      ) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
